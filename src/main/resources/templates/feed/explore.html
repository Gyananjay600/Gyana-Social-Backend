<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore - Gyana Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/explore.css}">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar" th:insert="~{nav :: sidebar}"></nav>
        
        <main class="main-content">
            <div class="explore-container">
                <div class="explore-header">
                    <h1><i class="fas fa-compass"></i> Explore</h1>
                    <div class="search-box">
                        <input type="text" id="searchPosts" placeholder="Search posts..." class="search-input">
                        <button class="search-btn"><i class="fas fa-search"></i></button>
                    </div>
                </div>
                
                <div class="posts-grid" id="explorerPosts">
                    <!-- Posts will be loaded in grid format -->
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script th:src="@{/js/api.js}"></script>
    <script th:src="@{/js/notifications.js}"></script>
    <script>
        async function loadExplorePosts() {
            try {
                const posts = await api.get('/api/posts');
                displayExploreGrid(posts);
            } catch (error) {
                showNotification('Failed to load posts', 'error');
            }
        }
        
        function displayExploreGrid(posts) {
            const grid = document.getElementById('explorerPosts');
            grid.innerHTML = '';
            
            posts.forEach(post => {
                const gridItem = `
                    <div class="grid-item" onclick="window.location.href='/ui/posts/${post.id}'">
                        ${post.image ? `<img src="${post.image}" alt="Post">` : ''}
                        ${post.video ? `<video src="${post.video}"></video>` : ''}
                        <div class="grid-overlay">
                            <div class="grid-stats">
                                <span><i class="fas fa-heart"></i> ${post.liked.length}</span>
                                <span><i class="fas fa-comment"></i> ${post.comment?.length || 0}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += gridItem;
            });
        }
        
        document.getElementById('searchPosts').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            // Implement search filtering
            loadExplorePosts();
        });
        
        document.addEventListener('DOMContentLoaded', loadExplorePosts);
    </script>
</body>
</html>
