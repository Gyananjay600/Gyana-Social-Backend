<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Gyana Social'">Gyana Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style th:inline="css">
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --text-dark: #1a1a1a;
            --text-light: #666;
            --text-muted: #999;
            --bg-light: #f5f5f5;
            --bg-lighter: #fafafa;
            --border-color: #e1e1e1;
            --success: #4caf50;
            --danger: #f44336;
            --warning: #ff9800;
            --info: #2196f3;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <a href="/ui/dashboard" class="logo">
                    <i class="fas fa-camera"></i>
                    <span>Gyana Social</span>
                </a>
            </div>
            
            <div class="sidebar-menu">
                <a href="/ui/dashboard" class="menu-item">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="/ui/feed" class="menu-item">
                    <i class="fas fa-stream"></i>
                    <span>Feed</span>
                </a>
                <a href="/ui/explore" class="menu-item">
                    <i class="fas fa-compass"></i>
                    <span>Explore</span>
                </a>
                <a href="/ui/stories" class="menu-item">
                    <i class="fas fa-square"></i>
                    <span>Stories</span>
                </a>
                <a href="/ui/reels" class="menu-item">
                    <i class="fas fa-film"></i>
                    <span>Reels</span>
                </a>
                <a href="/ui/messages" class="menu-item">
                    <i class="fas fa-envelope"></i>
                    <span>Messages</span>
                </a>
                <hr class="sidebar-divider">
                <a href="/ui/profile" class="menu-item">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
                <a href="/ui/users/suggestions" class="menu-item">
                    <i class="fas fa-user-plus"></i>
                    <span>Discover</span>
                </a>
                <a href="/ui/settings" class="menu-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
                <a href="/logout" class="menu-item danger">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
            
            <button class="create-btn" onclick="window.location.href='/ui/posts/create'">
                <i class="fas fa-plus"></i> Create
            </button>
        </nav>
        
        <!-- Main Content -->
        <main class="main-content">
            <div class="content-wrapper">
                <th:block th:insert="${content}"></th:block>
            </div>
        </main>
    </div>
    
    <!-- Toast Notifications -->
    <div id="toast-container"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script th:src="@{/js/api.js}"></script>
    <script th:src="@{/js/notifications.js}"></script>
    <script th:src="@{/js/common.js}"></script>
</body>
</html>
