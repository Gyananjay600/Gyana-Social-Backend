<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Gyana Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        
        .app-wrapper {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }
        
        .sidebar {
            background: white;
            border-right: 1px solid #e0e0e0;
            padding: 30px 20px;
            position: fixed;
            width: 260px;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.08);
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .logo-section i {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 16px;
            color: #666;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .nav-item:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            color: #667eea;
            transform: translateX(5px);
        }
        
        .nav-item i {
            font-size: 1.2rem;
            width: 25px;
            text-align: center;
        }
        
        .main-content {
            grid-column: 2;
            padding: 40px;
            overflow-y: auto;
        }
        
        .dashboard-header {
            margin-bottom: 40px;
        }
        
        .dashboard-header h1 {
            font-size: 2.5rem;
            color: #1a1a1a;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .dashboard-header p {
            color: #666;
            font-size: 1rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border-left: 4px solid #667eea;
        }
        
        .stat-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }
        
        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #1a1a1a;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
        
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .action-btn {
            background: white;
            padding: 25px;
            border-radius: 15px;
            border: 2px dashed #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #667eea;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        
        .action-btn:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
            transform: scale(1.05);
        }
        
        .action-btn i {
            font-size: 2rem;
        }
        
        .recent-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }
        
        .section-title {
            font-size: 1.5rem;
            color: #1a1a1a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            color: #667eea;
        }
        
        @media (max-width: 768px) {
            .app-wrapper {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 20px;
            }
            
            .main-content {
                grid-column: 1;
                padding: 20px;
            }
            
            .dashboard-header h1 {
                font-size: 1.8rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo-section">
                <i class="fas fa-camera"></i>
                <span>Gyana</span>
            </div>
            
            <nav class="nav-menu">
                <a href="/ui/dashboard" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="/ui/feed" class="nav-item">
                    <i class="fas fa-stream"></i>
                    <span>Feed</span>
                </a>
                <a href="/ui/explore" class="nav-item">
                    <i class="fas fa-compass"></i>
                    <span>Explore</span>
                </a>
                <a href="/ui/stories" class="nav-item">
                    <i class="fas fa-square"></i>
                    <span>Stories</span>
                </a>
                <a href="/ui/reels" class="nav-item">
                    <i class="fas fa-film"></i>
                    <span>Reels</span>
                </a>
                <a href="/ui/messages" class="nav-item">
                    <i class="fas fa-envelope"></i>
                    <span>Messages</span>
                </a>
                <hr style="margin: 15px 0; border: none; border-top: 1px solid #e0e0e0;">
                <a href="/ui/profile" class="nav-item">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
                <a href="/ui/users/suggestions" class="nav-item">
                    <i class="fas fa-user-plus"></i>
                    <span>Discover</span>
                </a>
                <a href="/ui/settings" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
                <a href="#" onclick="logout()" class="nav-item" style="color: #f44336;">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>
        
        <main class="main-content">
            <div class="dashboard-header">
                <h1>
                    <i class="fas fa-chart-line"></i>
                    Dashboard
                </h1>
                <p id="welcomeMessage">Welcome back!</p>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-image"></i></div>
                    <div class="stat-number" id="postCount">0</div>
                    <div class="stat-label">Posts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-number" id="followerCount">0</div>
                    <div class="stat-label">Followers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-user-check"></i></div>
                    <div class="stat-number" id="followingCount">0</div>
                    <div class="stat-label">Following</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-film"></i></div>
                    <div class="stat-number" id="reelCount">0</div>
                    <div class="stat-label">Reels</div>
                </div>
            </div>
            
            <div class="action-buttons">
                <a href="/ui/posts/create" class="action-btn">
                    <i class="fas fa-plus-circle"></i>
                    <span>Create Post</span>
                </a>
                <a href="/ui/stories/create" class="action-btn">
                    <i class="fas fa-book"></i>
                    <span>Add Story</span>
                </a>
                <a href="/ui/reels/create" class="action-btn">
                    <i class="fas fa-video"></i>
                    <span>Make Reel</span>
                </a>
                <a href="/ui/users/suggestions" class="action-btn">
                    <i class="fas fa-search"></i>
                    <span>Discover</span>
                </a>
            </div>
            
            <div class="recent-section">
                <h2 class="section-title">
                    <i class="fas fa-clock"></i>
                    Recent Activity
                </h2>
                <p style="color: #999;">Your recent posts and activities will appear here.</p>
            </div>
        </main>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script>
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('jwt');
                window.location.href = '/login';
            }
        }
        
        async function loadDashboard() {
            try {
                const token = localStorage.getItem('jwt');
                if (!token) {
                    window.location.href = '/login';
                    return;
                }
                
                const response = await axios.get('http://localhost:5454/api/users/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const user = response.data;
                document.getElementById('welcomeMessage').textContent = `Welcome back, ${user.firstName}!`;
                document.getElementById('postCount').textContent = user.posts?.length || 0;
                document.getElementById('followerCount').textContent = user.followers?.length || 0;
                document.getElementById('followingCount').textContent = user.followings?.length || 0;
            } catch (error) {
                if (error.response?.status === 401) {
                    localStorage.removeItem('jwt');
                    window.location.href = '/login';
                }
                console.error('Failed to load dashboard', error);
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
