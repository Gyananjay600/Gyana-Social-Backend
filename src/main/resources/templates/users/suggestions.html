<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggested Users - Gyana Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/suggestions.css}">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar" th:insert="~{nav :: sidebar}"></nav>
        
        <main class="main-content">
            <div class="suggestions-container">
                <h1><i class="fas fa-user-plus"></i> Discover People</h1>
                <div class="suggestions-list" id="suggestionsList"></div>
            </div>
        </main>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script th:src="@{/js/api.js}"></script>
    <script th:src="@{/js/notifications.js}"></script>
    <script>
        async function loadSuggestions() {
            try {
                const users = await api.get('/api/users');
                displaySuggestions(users);
            } catch (error) {
                showNotification('Failed to load suggestions', 'error');
            }
        }
        
        function displaySuggestions(users) {
            const container = document.getElementById('suggestionsList');
            container.innerHTML = '';
            
            users.slice(0, 10).forEach(user => {
                const userCard = `
                    <div class="suggestion-card">
                        <img src="https://via.placeholder.com/80" alt="Avatar" class="user-avatar">
                        <h3>${user.firstName} ${user.lastName}</h3>
                        <p>@${user.email}</p>
                        <div class="card-actions">
                            <button class="btn-follow" onclick="followUser(${user.id})">
                                <i class="fas fa-user-plus"></i> Follow
                            </button>
                            <button class="btn-view" onclick="window.location.href='/ui/profile/${user.id}'">
                                View Profile
                            </button>
                        </div>
                    </div>
                `;
                container.innerHTML += userCard;
            });
        }
        
        async function followUser(userId) {
            try {
                await api.put(`/api/users/follow/${userId}`);
                showNotification('Followed!', 'success');
                loadSuggestions();
            } catch (error) {
                showNotification('Failed to follow user', 'error');
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadSuggestions);
    </script>
</body>
</html>
