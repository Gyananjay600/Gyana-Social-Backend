<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reels - Gyana Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/reels.css}">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar" th:insert="~{nav :: sidebar}"></nav>
        
        <main class="main-content">
            <div class="reels-container">
                <div class="reels-header">
                    <h1><i class="fas fa-film"></i> Reels</h1>
                    <button class="btn-create" onclick="window.location.href='/ui/reels/create'">
                        <i class="fas fa-plus"></i> Create Reel
                    </button>
                </div>
                
                <div class="reels-list" id="reelsList">
                    <!-- Reels will be loaded here -->
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script th:src="@{/js/api.js}"></script>
    <script th:src="@{/js/notifications.js}"></script>
    <script>
        async function loadReels() {
            try {
                const reels = await api.get('/api/reels');
                displayReels(reels);
            } catch (error) {
                showNotification('Failed to load reels', 'error');
            }
        }
        
        function displayReels(reels) {
            const container = document.getElementById('reelsList');
            
            if (!reels || reels.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No reels yet</p></div>';
                return;
            }
            
            container.innerHTML = '';
            reels.forEach(reel => {
                const reelItem = `
                    <div class="reel-item" onclick="window.location.href='/ui/reels/${reel.id}'">
                        <video class="reel-video">
                            <source src="${reel.video}" type="video/mp4">
                        </video>
                        <div class="reel-overlay">
                            <div class="reel-info">
                                <h3>${reel.caption}</h3>
                                <div class="reel-stats">
                                    <span><i class="fas fa-heart"></i> ${reel.liked.length}</span>
                                    <span><i class="fas fa-eye"></i> ${reel.views}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += reelItem;
            });
        }
        
        document.addEventListener('DOMContentLoaded', loadReels);
    </script>
</body>
</html>
