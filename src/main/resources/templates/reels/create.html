<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Reel - Gyana Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/create-reel.css}">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar" th:insert="~{nav :: sidebar}"></nav>
        
        <main class="main-content">
            <div class="create-reel-container">
                <div class="reel-header">
                    <h1><i class="fas fa-film"></i> Create Reel</h1>
                    <p>Share short videos with your followers</p>
                </div>
                
                <form id="createReelForm" class="create-reel-form">
                    <div class="form-group">
                        <label>Reel Description</label>
                        <textarea id="reelCaption" name="caption" placeholder="Describe your reel..." class="caption-input"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="reelVideo">Upload Video</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="reelVideo" name="video" accept="video/*" class="file-input" required>
                            <div class="file-placeholder">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <p>Click to upload video (Max 60 seconds)</p>
                            </div>
                        </div>
                        <div id="reelPreview" class="preview-container"></div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn-cancel" onclick="window.history.back()">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                        <button type="submit" class="btn-publish">
                            <i class="fas fa-check"></i> Publish Reel
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script th:src="@{/js/api.js}"></script>
    <script th:src="@{/js/notifications.js}"></script>
    <script>
        const reelVideoInput = document.getElementById('reelVideo');
        const createReelForm = document.getElementById('createReelForm');
        
        reelVideoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    document.getElementById('reelPreview').innerHTML = `
                        <video controls>
                            <source src="${event.target.result}" type="video/mp4">
                        </video>
                        <button type="button" class="remove-btn" onclick="removeReelPreview()">Remove</button>
                    `;
                };
                reader.readAsDataURL(file);
            }
        });
        
        function removeReelPreview() {
            document.getElementById('reelVideo').value = '';
            document.getElementById('reelPreview').innerHTML = '';
        }
        
        createReelForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const caption = document.getElementById('reelCaption').value;
            const videoInput = document.getElementById('reelVideo');
            
            const reelData = {
                caption: caption,
                video: videoInput.value ? videoInput.value : null
            };
            
            try {
                const response = await api.post('/api/reels', reelData);
                showNotification('Reel published successfully!', 'success');
                setTimeout(() => {
                    window.location.href = '/ui/reels';
                }, 1500);
            } catch (error) {
                showNotification('Failed to create reel', 'error');
            }
        });
    </script>
</body>
</html>
