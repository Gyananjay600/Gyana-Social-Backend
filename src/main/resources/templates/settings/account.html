<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings - Gyana Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/account-settings.css}">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar" th:insert="~{nav :: sidebar}"></nav>
        
        <main class="main-content">
            <div class="account-settings-container">
                <button class="back-btn" onclick="window.history.back()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
                
                <h1><i class="fas fa-user-shield"></i> Account Settings</h1>
                
                <div class="settings-section">
                    <h2>Password Management</h2>
                    <form id="changePasswordForm" class="settings-form">
                        <div class="form-group">
                            <label for="currentPassword">Current Password</label>
                            <input type="password" id="currentPassword" required>
                        </div>
                        <div class="form-group">
                            <label for="newPassword">New Password</label>
                            <input type="password" id="newPassword" required>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" required>
                        </div>
                        <button type="submit" class="btn-save">Update Password</button>
                    </form>
                </div>
                
                <div class="settings-section danger-zone">
                    <h2><i class="fas fa-exclamation-triangle"></i> Danger Zone</h2>
                    <p>Once you delete your account, there is no going back. Please be certain.</p>
                    <button class="btn-delete" onclick="deleteAccount()">
                        <i class="fas fa-trash"></i> Delete Account
                    </button>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script th:src="@{/js/api.js}"></script>
    <script th:src="@{/js/notifications.js}"></script>
    <script>
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            showNotification('Password change feature coming soon', 'info');
        });
        
        function deleteAccount() {
            if (confirm('Are you sure you want to delete your account? This action cannot be undone!')) {
                // Call delete API
                showNotification('Account deleted', 'success');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1500);
            }
        }
    </script>
</body>
</html>
