<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Gyana Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/settings.css}">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar" th:insert="~{nav :: sidebar}"></nav>
        
        <main class="main-content">
            <div class="settings-container">
                <h1><i class="fas fa-cog"></i> Settings</h1>
                
                <div class="settings-menu">
                    <a href="/ui/account-settings" class="menu-item">
                        <i class="fas fa-user"></i>
                        <span>Account Settings</span>
                        <i class="fas fa-chevron-right"></i>
                    </a>
                    <a href="/ui/profile/edit" class="menu-item">
                        <i class="fas fa-edit"></i>
                        <span>Edit Profile</span>
                        <i class="fas fa-chevron-right"></i>
                    </a>
                    <a href="#" class="menu-item">
                        <i class="fas fa-bell"></i>
                        <span>Notifications</span>
                        <i class="fas fa-chevron-right"></i>
                    </a>
                    <a href="#" class="menu-item">
                        <i class="fas fa-lock"></i>
                        <span>Privacy</span>
                        <i class="fas fa-chevron-right"></i>
                    </a>
                    <a href="#" class="menu-item">
                        <i class="fas fa-moon"></i>
                        <span>Theme</span>
                        <i class="fas fa-chevron-right"></i>
                    </a>
                    <a href="#" class="menu-item danger" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script th:src="@{/js/api.js}"></script>
    <script th:src="@{/js/notifications.js}"></script>
    <script>
        function logout() {
            localStorage.removeItem('jwt');
            showNotification('Logged out successfully', 'success');
            setTimeout(() => {
                window.location.href = '/login';
            }, 1500);
        }
    </script>
</body>
</html>
