<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Posts - Gyana Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/saved-posts.css}">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar" th:insert="~{nav :: sidebar}"></nav>
        
        <main class="main-content">
            <div class="saved-posts-container">
                <div class="container-header">
                    <h1><i class="fas fa-bookmark"></i> Saved Posts</h1>
                </div>
                
                <div class="posts-grid" id="savedPostsGrid">
                    <!-- Saved posts will be loaded here -->
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script th:src="@{/js/api.js}"></script>
    <script th:src="@{/js/notifications.js}"></script>
    <script>
        async function loadSavedPosts() {
            try {
                // Get current user profile
                const userProfile = await api.get('/api/users/profile');
                displaySavedPosts(userProfile.savedPost);
            } catch (error) {
                showNotification('Failed to load saved posts', 'error');
            }
        }
        
        function displaySavedPosts(posts) {
            const grid = document.getElementById('savedPostsGrid');
            
            if (!posts || posts.length === 0) {
                grid.innerHTML = '<div class="empty-state"><p>No saved posts yet</p></div>';
                return;
            }
            
            grid.innerHTML = '';
            posts.forEach(post => {
                const postItem = `
                    <div class="post-item" onclick="window.location.href='/ui/posts/${post.id}'">
                        ${post.image ? `<img src="${post.image}" alt="Post">` : ''}
                        ${post.video ? `<video src="${post.video}"></video>` : ''}
                        <div class="post-overlay">
                            <div class="post-info">
                                <span><i class="fas fa-heart"></i> ${post.liked.length}</span>
                                <span><i class="fas fa-comment"></i> ${post.comment?.length || 0}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += postItem;
            });
        }
        
        document.addEventListener('DOMContentLoaded', loadSavedPosts);
    </script>
</body>
</html>
